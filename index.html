<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Planning">
<title>Mon Planning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F7F4;
    --white: #ffffff;
    --dark: #1C1C1A;
    --border: #EFEFEB;
    --muted: #B0AFA8;
    --text2: #888;
    --chip-bg: #F4F3F0;
    --work-bg: #EFF6FF; --work: #2563EB;
    --perso-bg: #ECFDF5; --perso: #059669;
    --obj-bg: #FFFBEB; --obj: #D97706;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; height: -webkit-fill-available; }

  /* HEADER */
  .header {
    background: var(--dark);
    padding: calc(var(--safe-top) + 18px) 20px 16px;
    color: #fff;
    flex-shrink: 0;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .header-label { font-size: 10px; letter-spacing: 0.12em; color: #888; text-transform: uppercase; margin-bottom: 3px; }
  .header-date { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; }
  .nav-btns { display: flex; gap: 6px; align-items: center; }
  .nav-btn {
    background: #2C2C2A; border: none; color: #ccc; border-radius: 8px;
    width: 34px; height: 34px; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-appearance: none;
  }
  .nav-today {
    background: #2C2C2A; border: none; color: #aaa; border-radius: 8px;
    padding: 0 10px; height: 34px; font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .progress-row { display: flex; align-items: center; gap: 10px; }
  .progress-bar-bg { flex: 1; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #3B82F6, #10B981); border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 11px; color: #888; white-space: nowrap; }

  /* FILTERS */
  .filters {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px;
    flex-shrink: 0;
  }
  .filter-chips { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip {
    border: 2px solid var(--border); background: var(--bg); color: var(--text2);
    border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif;
    -webkit-appearance: none; transition: all 0.15s;
  }
  .chip.active-all { border-color: var(--dark); background: var(--dark); color: #fff; }
  .chip.active-work { border-color: var(--work); background: var(--work-bg); color: var(--work); }
  .chip.active-personal { border-color: var(--perso); background: var(--perso-bg); color: var(--perso); }
  .chip.active-objective { border-color: var(--obj); background: var(--obj-bg); color: var(--obj); }
  .add-btn {
    background: var(--dark); color: #fff; border: none; border-radius: 10px;
    padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    font-family: 'DM Sans', sans-serif; -webkit-appearance: none;
  }

  /* TASK LIST */
  .task-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px calc(var(--safe-bot) + 16px); }
  .empty-state { text-align: center; padding-top: 60px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .empty-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .empty-sub { font-size: 13px; }

  .task-card {
    background: var(--white); border-radius: 14px; padding: 13px 14px;
    border: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 9px; transition: opacity 0.2s;
  }
  .task-card.done { opacity: 0.5; }
  .check-btn {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--muted);
    background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff;
    -webkit-appearance: none; transition: all 0.15s;
  }
  .check-btn.checked-work { background: var(--work); border-color: var(--work); }
  .check-btn.checked-personal { background: var(--perso); border-color: var(--perso); }
  .check-btn.checked-objective { background: var(--obj); border-color: var(--obj); }
  .task-body { flex: 1; min-width: 0; }
  .task-title-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .task-title { font-size: 14px; font-weight: 600; color: var(--dark); }
  .task-title.done { text-decoration: line-through; }
  .cat-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.04em; }
  .badge-work { background: var(--work-bg); color: var(--work); }
  .badge-personal { background: var(--perso-bg); color: var(--perso); }
  .badge-objective { background: var(--obj-bg); color: var(--obj); }
  .task-time { font-size: 12px; color: var(--text2); background: var(--chip-bg); padding: 2px 8px; border-radius: 6px; font-weight: 500; margin-top: 5px; display: inline-block; }
  .task-note { font-size: 11px; color: #aaa; margin-top: 5px; line-height: 1.5; }
  .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .action-btn {
    background: var(--chip-bg); border: none; border-radius: 7px;
    padding: 5px 7px; cursor: pointer; font-size: 13px; -webkit-appearance: none;
  }
  .action-btn.del { background: #FEF2F2; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--white); border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(var(--safe-bot) + 28px);
    width: 100%; max-width: 600px;
    transform: translateY(40px); transition: transform 0.25s ease;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; }
  .close-btn { background: var(--chip-bg); border: none; border-radius: 8px; padding: 6px 10px; font-size: 16px; cursor: pointer; }

  .field { margin-bottom: 14px; }
  .field label { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; border: 2px solid var(--border); border-radius: 10px;
    padding: 10px 13px; font-size: 15px; outline: none; font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--dark); transition: border-color 0.15s;
    -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--dark); background: var(--white); }
  .field textarea { resize: none; line-height: 1.5; }
  .cat-btns { display: flex; gap: 8px; }
  .cat-btn {
    flex: 1; border: 2px solid var(--border); background: var(--bg); color: var(--text2);
    border-radius: 10px; padding: 9px 0; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif; -webkit-appearance: none; transition: all 0.15s;
  }
  .cat-btn.sel-work { border-color: var(--work); background: var(--work-bg); color: var(--work); }
  .cat-btn.sel-personal { border-color: var(--perso); background: var(--perso-bg); color: var(--perso); }
  .cat-btn.sel-objective { border-color: var(--obj); background: var(--obj-bg); color: var(--obj); }
  .time-row { display: flex; gap: 10px; }
  .time-row .field { flex: 1; margin-bottom: 0; }
  .submit-btn {
    width: 100%; background: var(--dark); color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px;
    font-family: 'DM Sans', sans-serif; -webkit-appearance: none;
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-label">Planning quotidien</div>
        <div class="header-date" id="headerDate">—</div>
      </div>
      <div class="nav-btns">
        <button class="nav-btn" onclick="changeDay(-1)">‹</button>
        <button class="nav-today" onclick="goToday()">Auj.</button>
        <button class="nav-btn" onclick="changeDay(1)">›</button>
      </div>
    </div>
    <div class="progress-row">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">0/0 tâches</span>
    </div>
  </div>

  <div class="filters">
    <div class="filter-chips">
      <button class="chip active-all" id="chip-all" onclick="setFilter('all')">Tout</button>
      <button class="chip" id="chip-work" onclick="setFilter('work')">Travail</button>
      <button class="chip" id="chip-personal" onclick="setFilter('personal')">Personnel</button>
      <button class="chip" id="chip-objective" onclick="setFilter('objective')">Objectif</button>
    </div>
    <button class="add-btn" onclick="openForm()"><span style="font-size:18px;line-height:1">+</span> Ajouter</button>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Nouvelle tâche</div>
      <button class="close-btn" onclick="closeForm()">✕</button>
    </div>

    <div class="field">
      <label>Titre *</label>
      <input type="text" id="fTitle" placeholder="Décris ta tâche…" onkeydown="if(event.key==='Enter')submitForm()">
    </div>
    <div class="field">
      <label>Catégorie</label>
      <div class="cat-btns">
        <button class="cat-btn sel-work" id="catWork" onclick="selectCat('work')">Travail</button>
        <button class="cat-btn" id="catPersonal" onclick="selectCat('personal')">Personnel</button>
        <button class="cat-btn" id="catObjective" onclick="selectCat('objective')">Objectif</button>
      </div>
    </div>
    <div class="time-row">
      <div class="field">
        <label>Début</label>
        <select id="fStart"></select>
      </div>
      <div class="field">
        <label>Fin</label>
        <select id="fEnd"></select>
      </div>
    </div>
    <div class="field" style="margin-top:14px">
      <label>Note (optionnel)</label>
      <textarea id="fNote" rows="2" placeholder="Détails supplémentaires…"></textarea>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitForm()">Ajouter la tâche</button>
  </div>
</div>

<script>
  // ── State ──
  let currentDate = new Date();
  let tasks = JSON.parse(localStorage.getItem('planner_tasks') || '{}');
  let filter = 'all';
  let editingId = null;
  let formCat = 'work';

  const DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const MONTHS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const CAT = {
    work:      { label: 'Travail',   badge: 'badge-work',      checked: 'checked-work',      btn: 'sel-work' },
    personal:  { label: 'Personnel', badge: 'badge-personal',  checked: 'checked-personal',  btn: 'sel-personal' },
    objective: { label: 'Objectif',  badge: 'badge-objective', checked: 'checked-objective', btn: 'sel-objective' },
  };

  // Generate time slots 06:00 → 22:30 every 30min
  const SLOTS = [];
  for (let i = 0; i < 34; i++) {
    const m = 6*60 + i*30;
    SLOTS.push(`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`);
  }

  function toKey(d) { return d.toISOString().split('T')[0]; }
  function saveTasks() { localStorage.setItem('planner_tasks', JSON.stringify(tasks)); }

  // ── Init selects ──
  function initSelects() {
    ['fStart','fEnd'].forEach((id, idx) => {
      const sel = document.getElementById(id);
      sel.innerHTML = SLOTS.map(t => `<option value="${t}">${t}</option>`).join('');
      sel.value = idx === 0 ? '09:00' : '10:00';
    });
  }

  // ── Render ──
  function render() {
    const key = toKey(currentDate);
    const d = currentDate;
    document.getElementById('headerDate').textContent =
      `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;

    const all = tasks[key] || [];
    const done = all.filter(t => t.done).length;
    const pct = all.length ? (done / all.length * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${done}/${all.length} tâches`;

    const filtered = all.filter(t => filter === 'all' || t.category === filter);
    const sorted = [...filtered].sort((a,b) => a.start.localeCompare(b.start));

    const list = document.getElementById('taskList');
    if (sorted.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Aucune tâche pour ce jour</div>
        <div class="empty-sub">Appuie sur "+ Ajouter" pour commencer</div>
      </div>`;
      return;
    }

    list.innerHTML = sorted.map(task => {
      const cat = CAT[task.category];
      return `<div class="task-card ${task.done ? 'done' : ''}">
        <button class="check-btn ${task.done ? cat.checked : ''}" onclick="toggleDone(${task.id})">${task.done ? '✓' : ''}</button>
        <div class="task-body">
          <div class="task-title-row">
            <span class="task-title ${task.done ? 'done' : ''}">${escHtml(task.title)}</span>
            <span class="cat-badge ${cat.badge}">${cat.label}</span>
          </div>
          <span class="task-time">🕐 ${task.start} – ${task.end}</span>
          ${task.note ? `<div class="task-note">${escHtml(task.note)}</div>` : ''}
        </div>
        <div class="task-actions">
          <button class="action-btn" onclick="editTask(${task.id})">✏️</button>
          <button class="action-btn del" onclick="deleteTask(${task.id})">🗑️</button>
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Actions ──
  function changeDay(offset) {
    currentDate = new Date(currentDate);
    currentDate.setDate(currentDate.getDate() + offset);
    render();
  }
  function goToday() { currentDate = new Date(); render(); }
  function setFilter(f) {
    filter = f;
    ['all','work','personal','objective'].forEach(k => {
      const el = document.getElementById('chip-' + k);
      el.className = 'chip' + (k === f ? ` active-${k}` : '');
    });
    render();
  }

  function toggleDone(id) {
    const key = toKey(currentDate);
    tasks[key] = (tasks[key] || []).map(t => t.id === id ? {...t, done: !t.done} : t);
    saveTasks(); render();
  }
  function deleteTask(id) {
    if (!confirm('Supprimer cette tâche ?')) return;
    const key = toKey(currentDate);
    tasks[key] = (tasks[key] || []).filter(t => t.id !== id);
    saveTasks(); render();
  }
  function editTask(id) {
    const key = toKey(currentDate);
    const task = (tasks[key] || []).find(t => t.id === id);
    if (!task) return;
    editingId = id;
    document.getElementById('fTitle').value = task.title;
    document.getElementById('fNote').value = task.note || '';
    document.getElementById('fStart').value = task.start;
    document.getElementById('fEnd').value = task.end;
    selectCat(task.category);
    document.getElementById('modalTitle').textContent = 'Modifier la tâche';
    document.getElementById('submitBtn').textContent = 'Enregistrer';
    openModal();
  }

  // ── Form ──
  function selectCat(cat) {
    formCat = cat;
    ['work','personal','objective'].forEach(k => {
      document.getElementById('cat' + k.charAt(0).toUpperCase() + k.slice(1)).className =
        'cat-btn' + (k === cat ? ` sel-${k}` : '');
    });
  }

  function openForm() {
    editingId = null;
    document.getElementById('fTitle').value = '';
    document.getElementById('fNote').value = '';
    document.getElementById('fStart').value = '09:00';
    document.getElementById('fEnd').value = '10:00';
    selectCat('work');
    document.getElementById('modalTitle').textContent = 'Nouvelle tâche';
    document.getElementById('submitBtn').textContent = 'Ajouter la tâche';
    openModal();
  }

  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fTitle').focus(), 300);
  }
  function closeForm() { document.getElementById('modalOverlay').classList.remove('open'); }
  function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeForm(); }

  function submitForm() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { document.getElementById('fTitle').focus(); return; }
    const key = toKey(currentDate);
    const task = {
      id: editingId || Date.now(),
      title,
      category: formCat,
      start: document.getElementById('fStart').value,
      end: document.getElementById('fEnd').value,
      note: document.getElementById('fNote').value.trim(),
      done: false
    };
    if (editingId) {
      const existing = (tasks[key] || []).find(t => t.id === editingId);
      task.done = existing ? existing.done : false;
      tasks[key] = (tasks[key] || []).map(t => t.id === editingId ? task : t);
    } else {
      tasks[key] = [...(tasks[key] || []), task];
    }
    saveTasks();
    closeForm();
    render();
  }

  // ── Boot ──
  initSelects();
  render();
</script>
</body>
</html>
